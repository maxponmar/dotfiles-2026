# Kitty configuration
#
# Curated config (Kitty ships a fully-commented default; everything not set here
# falls back to those built-in defaults). Reload a running Kitty with
# `ctrl+shift+f5`, or restart it. Full reference: https://sw.kovidgoyal.net/kitty/conf/

# --- Font ------------------------------------------------------------------
# MesloLGS Nerd Font is installed by install.sh (`install_fonts`) and is the
# same family Powerlevel10k expects, so prompt glyphs render correctly.
font_family        MesloLGS Nerd Font
bold_font          auto
italic_font        auto
bold_italic_font   auto
font_size          13.0

# --- Background ------------------------------------------------------------
# 1.0 = opaque, 0.0 = fully transparent. background_blur frosts whatever is
# behind the window (macOS / some Wayland compositors only; ignored elsewhere).
# dynamic_background_opacity lets ctrl+shift+a then m/l adjust opacity live and
# makes `background_opacity` changes apply on reload (ctrl+shift+f5) instead of
# only on a full restart.
dynamic_background_opacity yes
background_opacity  0.80
background_blur     20

# --- Misc niceties ---------------------------------------------------------
scrollback_lines    10000
enable_audio_bell   no
# Don't ask for confirmation when closing a window with running programs.
confirm_os_window_close 0
